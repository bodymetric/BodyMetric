<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Funny health apple logo</title>
  <desc id="desc">A playful green apple mascot with a white fitness headband, one eye winking, smiling, and holding a dumbbell. No text.</desc>
  <defs>
    <style>
      .outline { stroke:#16233A; stroke-width:18; stroke-linecap:round; stroke-linejoin:round; }
      .outlineThin { stroke:#16233A; stroke-width:12; stroke-linecap:round; stroke-linejoin:round; }
    </style>
    <linearGradient id="appleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A7E22E"/>
      <stop offset="100%" stop-color="#77BE17"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dumbbellGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58606E"/>
      <stop offset="100%" stop-color="#252B35"/>
    </linearGradient>
  </defs>

  <!-- Apple body -->
  <path class="outline" fill="url(#appleGrad)"
        d="M517 188
           C575 140, 688 154, 750 240
           C803 314, 808 426, 772 517
           C737 605, 657 680, 555 708
           C482 728, 402 722, 340 683
           C264 635, 217 557, 210 460
           C202 347, 251 250, 335 203
           C394 170, 470 163, 517 188 Z"/>

  <!-- Apple top notch -->
  <path class="outline" fill="#8BC71D"
        d="M468 178
           C486 140, 533 123, 575 131
           C547 160, 529 182, 526 214
           C507 196, 486 183, 468 178 Z"/>

  <!-- Stem -->
  <path class="outline" fill="#6C3F24"
        d="M574 129
           C592 104, 626 87, 653 90
           C636 115, 620 148, 613 181
           L567 170
           C568 154, 571 141, 574 129 Z"/>

  <!-- Leaf -->
  <path class="outline" fill="#43B128"
        d="M495 112
           C429 97, 367 121, 337 168
           C401 179, 452 173, 502 133
           C518 120, 528 111, 540 99
           C522 101, 510 107, 495 112 Z"/>

  <!-- Headband -->
  <path class="outline" fill="#F6F8FB"
        d="M311 255
           C413 221, 576 214, 711 249
           L697 301
           C576 271, 415 275, 324 307
           Z"/>
  <path class="outlineThin" fill="none"
        d="M320 280 C420 249, 575 247, 701 275"/>

  <!-- Left arm -->
  <path class="outline" fill="url(#appleGrad)"
        d="M295 473
           C226 484, 177 530, 171 591
           C168 626, 188 661, 225 675
           C260 688, 300 669, 313 637
           C328 602, 318 562, 313 526
           Z"/>

  <!-- Right arm with dumbbell -->
  <path class="outline" fill="url(#appleGrad)"
        d="M691 454
           C786 454, 853 500, 870 580
           C878 619, 869 657, 838 683
           C810 705, 768 709, 739 691
           C710 673, 699 641, 698 609
           C697 570, 699 528, 691 454 Z"/>

  <!-- Dumbbell handle -->
  <rect x="786" y="558" width="88" height="28" rx="12" fill="#1E222B" class="outlineThin"/>
  <!-- Dumbbell plates -->
  <rect x="739" y="530" width="38" height="85" rx="10" fill="url(#dumbbellGrad)" class="outlineThin"/>
  <rect x="776" y="515" width="32" height="115" rx="10" fill="url(#dumbbellGrad)" class="outlineThin"/>
  <rect x="872" y="530" width="38" height="85" rx="10" fill="url(#dumbbellGrad)" class="outlineThin"/>
  <rect x="841" y="515" width="32" height="115" rx="10" fill="url(#dumbbellGrad)" class="outlineThin"/>

  <!-- Eyes -->
  <circle cx="438" cy="402" r="30" fill="#FFFFFF" class="outlineThin"/>
  <circle cx="446" cy="408" r="11" fill="#16233A"/>
  <path d="M584 396 C609 374, 643 375, 664 399" fill="none" class="outlineThin"/>

  <!-- Smile -->
  <path d="M456 493 C495 542, 577 545, 624 490" fill="none" class="outline"/>
  <path d="M487 508 C516 534, 567 533, 596 506 L596 529 C566 552, 518 553, 487 528 Z"
        fill="#EA4B57" stroke="#16233A" stroke-width="10" stroke-linejoin="round"/>

  <!-- Cheeks -->
  <ellipse cx="404" cy="478" rx="30" ry="20" fill="#FF7A90" opacity="0.9"/>
  <ellipse cx="656" cy="476" rx="30" ry="20" fill="#FF7A90" opacity="0.9"/>

  <!-- Highlights -->
  <ellipse cx="365" cy="310" rx="78" ry="42" fill="url(#shineGrad)" transform="rotate(-25 365 310)"/>
  <ellipse cx="340" cy="438" rx="34" ry="74" fill="url(#shineGrad)" transform="rotate(-18 340 438)"/>

  <!-- Small shadow base -->
  <ellipse cx="516" cy="773" rx="244" ry="42" fill="#16233A" opacity="0.08"/>
</svg>
